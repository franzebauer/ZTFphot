name: ztf

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - astropy
  - matplotlib

  # Parquet I/O (used by pandas for .parquet files)
  - pyarrow

  # HTTP downloads
  - requests

  # Geometry (required by ztfquery internally)
  - shapely

  # funpack (from conda-forge); SExtractor installed separately — see README
  - cfitsio

  # pip-only packages
  - pip
  - pip:
      - ztfquery
